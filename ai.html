		<link rel="icon" type="image/png" sizes="16x16" href="logo2.png">

</head>
	
	<body>
	<center style="width: 100%;">
		
		<div style="width: 100%;">

			<div id="control_bar" style="justify-self: center;">

			<div id="EthanMichael2" class="control_element" onclick="goTo(0)" onmouseenter="oohColorful(this)" onmouseleave="noColor(this)"><img id="logo_lite" src="logo2.png"/>ETHAN MICHAEL & CO.</div>

			<div style="display: flex; flex-direction: row;">

				<div class="contact_lite" onclick="contactLightbox()"><h2>📲 CONTACT</h2></div>

				<div id="light_dark" class="control_element"></div>
				
			</div>

		</div>
		
		<div id="header" style="flex-direction: column;">

			<div class="nav_links">

				<div class="nav_link"><img src="25.png" style="width: calc(30px + 2vw);" onclick="goTo(3)"/></div>
				<div class="nav_link"><img src="26.png" style="width: calc(30px + 2vw);" onclick="goTo(4)"/></div>
				<div id="wdkshsk" class="nav_link"><img src="24.png" style="width: calc(30px + 2vw);" onclick="soonLightbox()"/></div>
				<div id="better_my_english" class="nav_link"><img src="23.png" style="width: calc(25px + 2vw);"/></div>

			</div>

		</div>

		<hr style="width: 80%;">
			    
		<br>

		<div class="nav_links">
			<div id="prompt_eng_btn" class="nav_link"><div id="prompt_eng_btn_text" class="nav_link_text">PROMPT ENG.</div></div>
			<div id="rag_so_btn" class="nav_link"><div id="rag_so_btn_text" class="nav_link_text">RAG / SO</div></div>
			<div id="multi_toolcall_btn" class="nav_link"><div id="multi_toolcall_btn_text" class="nav_link_text">MUTLI / TOOLCALL</div></div>
		</div>

		<iframe id="pdf_iframe" src="./docs/1.pdf"></iframe>

		<hr style="width: 80%;">
			    
		<br>
			
		<div id="footer">
			
			<div class="contact" onclick="contactLightbox()"><h2>📲 CLICK HERE TO GET IN TOUCH</h2></div>

			<div id="social_imgs">

				<img id="yt" class="social_img" src="1.png" onclick="goTo(2)"/>
				<img id="spotify" class="social_img" src="27.png" onclick="goTo(6)"/>
				<img id="apple" class="social_img" src="28.png" onclick="goTo(7)"/>

			</div>
			
			<div id="copyright">ETHAN MICHAEL & CO. © 2023 - 2026</div>
					
		</div>
			
	</center>
			
		<div id="lightbox">
					
			<div id="lightboxBar">
						
				<div id="lightboxX" onclick="closeLightbox()"></div>
						
			</div>
					
			<div id="contactInfo">
				<div id="email" class="contact_button"></div>
				<div id="phone" class="contact_button"></div>
				<div id="soon" class="contact_button"></div>
			</div>
			
		</div>

		<script src="global.js">widthHeight();</script>

		<script>

			const prompt_eng_btn = document.getElementById("prompt_eng_btn");
			const rag_so_btn = document.getElementById("rag_so_btn");
			const multi_toolcall_btn = document.getElementById("multi_toolcall_btn");
			const pdf_btns = [prompt_eng_btn, rag_so_btn, multi_toolcall_btn];

			function setPDF(x) {
				document.getElementById("pdf_iframe").src = `./docs/${x}.pdf`;
			}

			function setPDFColor(x) {

				pdf_btns.forEach(btn => {

					btn.style.color = "";
					
				});

				pdf_btns[x].style.color = "yellow";

			}

			document.addEventListener("DOMContentLoaded", function() {

  				playText();
				textChange();
				
			});
			
			

			prompt_eng_btn.addEventListener("click", () => {
				setPDF(1);
				setPDFColor(0);
			});
			
			rag_so_btn.addEventListener("click", () => {
				setPDF(2);
				setPDFColor(1);
			});

			multi_toolcall_btn.addEventListener("click", () => {
				setPDF(3);
				setPDFColor(2);
			});

			setPDF(1);
			setPDFColor(0);

		</script>
		    
	</body>

</html>
